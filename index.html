<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading…</title>
  <meta name="description" content="" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ════════════════════════════════════════════════════════
       DESIGN TOKENS
       Change colors, fonts, and spacing here. Nothing below
       this block needs to be touched to restyle the site.
       ════════════════════════════════════════════════════════ */
    :root {
      /* ── Palette ──────────────────────────────────────── */
      --bg:          #080808;   /* main page background      */
      --bg2:         #101010;   /* alternate section bg      */
      --bg3:         #181818;   /* card / element bg         */
      --accent:      #17a2dd;   /* primary brand color       */
      --accent2:     #5bc4f1;   /* lighter accent / hover    */
      --accent-dim:  rgba(23,162,221,.12);
      --white:       #ffffff;
      --gray:        #999999;
      --gray2:       #555555;
      --border:      rgba(255,255,255,.07);

      /* ── Typography ───────────────────────────────────── */
      --font-head:   'Montserrat', sans-serif;
      --font-body:   'Inter', sans-serif;

      /* ── Layout ───────────────────────────────────────── */
      --radius:      4px;
      --section-v:   100px;
      --section-h:   6%;
    }

    /* ─── Reset ─────────────────────────────────────────── */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body { background:var(--bg); color:var(--white); font-family:var(--font-body); overflow-x:hidden; }

    /* ─── Utility ────────────────────────────────────────── */
    .tag { display:inline-block; color:var(--accent2); font-size:.7rem; font-weight:700; letter-spacing:.2em; text-transform:uppercase; margin-bottom:14px; }
    .section-title { font-family:var(--font-head); font-size:clamp(1.9rem,3.5vw,2.8rem); font-weight:900; line-height:1.1; letter-spacing:-.02em; margin-bottom:18px; }
    .lead { font-size:1rem; color:var(--gray); line-height:1.8; font-weight:300; max-width:500px; }
    .fade-up { opacity:0; transform:translateY(28px); transition:opacity .65s ease,transform .65s ease; }
    .fade-up.vis { opacity:1; transform:translateY(0); }

    /* ─── Nav ────────────────────────────────────────────── */
    #nav { position:fixed; inset:0 0 auto 0; z-index:999; display:flex; justify-content:space-between; align-items:center; padding:22px var(--section-h); transition:background .35s,padding .35s,border-color .35s; border-bottom:1px solid transparent; }
    #nav.stuck { background:rgba(8,8,8,.95); backdrop-filter:blur(14px); padding:14px var(--section-h); border-color:var(--border); }
    .nav-logo { font-family:var(--font-head); font-weight:900; font-size:clamp(.95rem,1.6vw,1.2rem); color:var(--white); text-decoration:none; letter-spacing:.02em; white-space:nowrap; }
    .nav-logo em { color:var(--accent); font-style:normal; }
    .nav-links { display:flex; list-style:none; gap:32px; align-items:center; }
    .nav-links a { color:var(--gray); text-decoration:none; font-size:.8rem; font-weight:500; letter-spacing:.09em; text-transform:uppercase; transition:color .2s; }
    .nav-links a:hover { color:var(--white); }
    .nav-call { background:var(--accent)!important; color:var(--white)!important; padding:9px 20px; border-radius:var(--radius); font-size:.8rem!important; }
    .nav-call:hover { background:var(--accent2)!important; }
    .hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; padding:6px; }
    .hamburger span { display:block; width:24px; height:2px; background:var(--white); border-radius:2px; transition:all .3s; }
    .mobile-menu { display:none; position:fixed; inset:0; background:rgba(8,8,8,.97); z-index:998; flex-direction:column; align-items:center; justify-content:center; gap:36px; }
    .mobile-menu.open { display:flex; }
    .mobile-menu a { color:var(--white); text-decoration:none; font-family:var(--font-head); font-size:1.8rem; font-weight:800; transition:color .2s; }
    .mobile-menu a:hover { color:var(--accent); }

    /* ─── Hero ───────────────────────────────────────────── */
    #hero { position:relative; height:100vh; min-height:680px; display:flex; align-items:center; padding:0 var(--section-h); overflow:hidden; }
    .hero-bg { position:absolute; inset:0; background-size:cover; background-position:center right; background-repeat:no-repeat; z-index:0; }
    .hero-bg-dim { position:absolute; inset:0; background:rgba(0,0,0,.35); z-index:1; }
    .hero-veil { position:absolute; inset:0; background:linear-gradient(to right,rgba(8,8,8,.95) 0%,rgba(8,8,8,.82) 28%,rgba(8,8,8,.5) 52%,rgba(8,8,8,.15) 72%,transparent 88%); z-index:2; }
    #heroCanvas { position:absolute; inset:0; width:100%; height:100%; z-index:3; pointer-events:none; }
    .hero-glow-r { position:absolute; width:500px; height:500px; background:radial-gradient(circle,rgba(23,162,221,.2) 0%,transparent 70%); right:-40px; top:50%; transform:translateY(-50%); z-index:3; pointer-events:none; }
    .hero-content { position:relative; z-index:5; max-width:620px; }
    .hero-badge { display:inline-flex; align-items:center; gap:9px; background:rgba(23,162,221,.1); border:1px solid rgba(23,162,221,.3); color:var(--accent2); padding:6px 14px; border-radius:2px; font-size:.68rem; font-weight:700; letter-spacing:.18em; text-transform:uppercase; margin-bottom:26px; }
    .hero-badge::before { content:''; width:7px; height:7px; background:var(--accent2); border-radius:50%; animation:blink 2.2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)} }
    .hero-title { font-family:var(--font-head); font-size:clamp(2.6rem,5.5vw,4.8rem); font-weight:900; line-height:1.03; letter-spacing:-.025em; margin-bottom:22px; }
    .hero-title em { color:var(--accent); font-style:normal; }
    .hero-sub { font-size:1.05rem; color:var(--gray); line-height:1.75; font-weight:300; margin-bottom:38px; max-width:460px; }
    .hero-btns { display:flex; gap:14px; flex-wrap:wrap; }
    .btn-red { display:inline-flex; align-items:center; gap:10px; background:var(--accent); color:var(--white); padding:14px 30px; border-radius:var(--radius); font-weight:700; font-size:.88rem; text-decoration:none; letter-spacing:.04em; border:1px solid var(--accent); transition:all .25s; }
    .btn-red:hover { background:var(--accent2); border-color:var(--accent2); transform:translateY(-2px); box-shadow:0 12px 32px rgba(23,162,221,.4); }
    .btn-ghost { display:inline-flex; align-items:center; gap:10px; background:transparent; color:var(--white); padding:14px 30px; border-radius:var(--radius); font-weight:600; font-size:.88rem; text-decoration:none; letter-spacing:.04em; border:1px solid rgba(255,255,255,.2); transition:all .25s; }
    .btn-ghost:hover { border-color:rgba(255,255,255,.5); background:rgba(255,255,255,.05); }
    .scroll-hint { position:absolute; bottom:36px; left:50%; transform:translateX(-50%); display:flex; flex-direction:column; align-items:center; gap:8px; color:var(--gray2); font-size:.65rem; letter-spacing:.14em; text-transform:uppercase; z-index:5; }
    .scroll-hint-line { width:1px; height:44px; background:linear-gradient(to bottom,var(--gray2),transparent); animation:lineAnim 2s ease-in-out infinite; }
    @keyframes lineAnim { 0%{transform:scaleY(0);transform-origin:top}49%{transform:scaleY(1);transform-origin:top}51%{transform:scaleY(1);transform-origin:bottom}100%{transform:scaleY(0);transform-origin:bottom} }

    /* ─── Stats ──────────────────────────────────────────── */
    #stats { background:var(--bg3); border-top:1px solid var(--border); border-bottom:1px solid var(--border); padding:0 var(--section-h); }
    .stats-inner { display:grid; grid-template-columns:repeat(4,1fr); }
    .stat-item { text-align:center; padding:44px 20px; border-right:1px solid var(--border); }
    .stat-item:last-child { border-right:0; }
    .stat-num { font-family:var(--font-head); font-size:3rem; font-weight:900; color:var(--accent); line-height:1; margin-bottom:6px; }
    .stat-label { font-size:.72rem; color:var(--gray); letter-spacing:.12em; text-transform:uppercase; font-weight:500; }

    /* ─── Section shared ─────────────────────────────────── */
    .section { padding:var(--section-v) var(--section-h); }
    .section-dark  { background:var(--bg);  }
    .section-dark2 { background:var(--bg2); }
    .section-dark3 { background:var(--bg3); }

    /* ─── About ──────────────────────────────────────────── */
    .about-grid { display:grid; grid-template-columns:1fr 1fr; gap:80px; align-items:center; max-width:1140px; margin:0 auto; }
    .about-visual-wrap { position:relative; }
    .about-card { width:100%; aspect-ratio:4/3; background:var(--bg3); border-radius:var(--radius); overflow:hidden; border:1px solid var(--border); position:relative; }
    .about-card-line { position:absolute; top:0; left:0; width:2px; height:100%; background:linear-gradient(to bottom,var(--accent),transparent); z-index:2; }
    .about-photo { width:100%; height:100%; object-fit:cover; display:block; border-radius:var(--radius); }
    .about-years-badge { position:absolute; bottom:-22px; right:-22px; width:110px; height:110px; background:var(--accent); border-radius:50%; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; box-shadow:0 0 50px rgba(23,162,221,.55); border:3px solid var(--bg); z-index:2; }
    .badge-num { font-family:var(--font-head); font-size:2rem; font-weight:900; line-height:1; }
    .badge-txt { font-size:.58rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; opacity:.9; }
    .about-features { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:32px; max-width:520px; }
    .feat { display:flex; align-items:flex-start; gap:12px; padding:16px; background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius); transition:border-color .2s; }
    .feat:hover { border-color:rgba(23,162,221,.3); }
    .feat-icon { width:34px; min-width:34px; height:34px; background:var(--accent-dim); border-radius:var(--radius); display:flex; align-items:center; justify-content:center; }
    .feat-icon svg { width:17px; height:17px; }
    .feat-name { font-size:.84rem; font-weight:600; line-height:1.35; }
    .feat-sub { font-size:.73rem; color:var(--gray2); margin-top:2px; }

    /* ─── Services ───────────────────────────────────────── */
    .svc-header { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:50px; gap:30px; max-width:1140px; margin-left:auto; margin-right:auto; }
    .svc-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:36px 26px; max-width:1140px; margin-left:auto; margin-right:auto; }
    .svc-card { background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius); position:relative; overflow:hidden; transition:all .3s; padding:0; width:100%; }
    .svc-card::after { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--accent); transform:scaleX(0); transform-origin:left; transition:transform .35s; }
    .svc-card:hover { border-color:rgba(23,162,221,.35); transform:translateY(-5px); box-shadow:0 24px 60px rgba(0,0,0,.55),0 0 30px rgba(23,162,221,.1); }
    .svc-card:hover::after { transform:scaleX(1); }
    .svc-card-photo { height:175px; overflow:hidden; position:relative; }
    .svc-card-img { width:100%; height:100%; object-fit:cover; transition:transform .6s ease; display:block; }
    .svc-card:hover .svc-card-img { transform:scale(1.08); }
    .svc-card-photo-grad { position:absolute; inset:0; background:linear-gradient(to bottom,transparent 20%,rgba(24,24,24,.97) 100%); }
    .svc-card-body { padding:20px 26px 28px; }
    .svc-name { font-family:var(--font-head); font-size:1.05rem; font-weight:800; margin-bottom:6px; letter-spacing:-.01em; }
    .svc-price { font-size:.78rem; color:var(--gray2); margin-bottom:10px; }
    .svc-price em { font-style:normal; color:var(--accent2); font-weight:700; font-size:.88rem; }
    .svc-desc { font-size:.84rem; color:var(--gray); line-height:1.75; font-weight:300; }
    .svc-list { list-style:none; margin-top:0; padding-top:0; border-top:none; max-height:0; overflow:hidden; transition:max-height .4s ease, padding-top .4s ease, margin-top .4s ease; }
    .svc-card.open .svc-list { max-height:300px; margin-top:16px; padding-top:16px; border-top:1px solid var(--border); }
    .svc-list li { font-size:.76rem; color:var(--gray2); padding:3px 0 3px 14px; position:relative; }
    .svc-list li::before { content:''; position:absolute; left:0; top:50%; transform:translateY(-50%); width:4px; height:4px; background:var(--accent); border-radius:50%; }
    .svc-toggle { display:flex; align-items:center; gap:6px; margin-top:14px; font-size:.72rem; color:var(--gray2); font-weight:600; letter-spacing:.08em; text-transform:uppercase; cursor:pointer; transition:color .2s; }
    .svc-toggle:hover { color:var(--white); }
    .svc-toggle svg { width:14px; height:14px; stroke:currentColor; fill:none; stroke-width:2; transition:transform .3s; }
    .svc-card.open .svc-toggle svg { transform:rotate(180deg); }

    /* ─── Process ────────────────────────────────────────── */
    #process { position:relative; overflow:hidden; }
    #process::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 50% 50%,rgba(23,162,221,.05) 0%,transparent 65%); pointer-events:none; }
    .process-row { display:grid; grid-template-columns:repeat(4,1fr); gap:0; margin-top:60px; position:relative; }
    .process-row::before { content:''; position:absolute; top:30px; left:calc(12.5% + 2px); right:calc(12.5% + 2px); height:1px; background:linear-gradient(to right,transparent,rgba(23,162,221,.35),rgba(23,162,221,.35),rgba(23,162,221,.35),transparent); }
    .proc-step { text-align:center; padding:0 24px 10px; position:relative; transition:transform .35s ease; }
    .proc-step:hover { transform:scale(1.12); z-index:2; }
    .proc-circle { width:60px; height:60px; background:var(--bg3); border:1px solid rgba(23,162,221,.45); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 22px; position:relative; font-family:var(--font-head); font-size:1.3rem; font-weight:900; color:var(--accent); transition:border-color .35s, box-shadow .35s, background .35s; }
    .proc-step:hover .proc-circle { border-color:var(--accent); box-shadow:0 0 24px rgba(23,162,221,.4), 0 0 60px rgba(23,162,221,.15); background:rgba(23,162,221,.08); }
    .proc-circle::after { content:''; position:absolute; inset:-5px; border-radius:50%; border:1px solid rgba(23,162,221,.15); transition:border-color .35s, inset .35s; }
    .proc-step:hover .proc-circle::after { border-color:rgba(23,162,221,.4); inset:-8px; }
    .proc-title { font-family:var(--font-head); font-size:.95rem; font-weight:700; margin-bottom:8px; transition:color .35s; }
    .proc-step:hover .proc-title { color:var(--accent2); }
    .proc-desc { font-size:.8rem; color:var(--gray); line-height:1.7; transition:color .35s; }
    .proc-step:hover .proc-desc { color:var(--white); }

    /* ─── Gallery ────────────────────────────────────────── */
    .gallery-head { text-align:center; margin-bottom:20px; }
    .gallery-head .section-title { font-size:clamp(1.5rem,2.4vw,2rem); margin-bottom:8px; }
    .gallery-head .lead { margin:0 auto; font-size:.9rem; }
    .gallery-tabs { display:flex; gap:0; justify-content:center; margin-bottom:24px; border-bottom:1px solid var(--border); }
    .gtab { background:none; border:none; color:var(--gray); font-family:var(--font-head); font-weight:700; font-size:.82rem; letter-spacing:.12em; text-transform:uppercase; padding:14px 32px; cursor:pointer; position:relative; transition:color .2s; }
    .gtab::after { content:''; position:absolute; bottom:-1px; left:0; right:0; height:2px; background:var(--accent); transform:scaleX(0); transition:transform .25s; }
    .gtab.active { color:var(--white); }
    .gtab.active::after { transform:scaleX(1); }
    .gallery-panel { display:none; }
    .gallery-panel.active { display:block; }
    .gallery-carousel-wrap { position:relative; overflow:hidden; max-width:1080px; margin:0 auto; }
    .gallery-carousel { display:flex; transition:transform .5s cubic-bezier(.25,.46,.45,.94); }
    .gal-slide { flex:0 0 62%; padding:0 10px; position:relative; transition:transform .5s ease, opacity .5s ease; transform:scale(.84); opacity:.35; }
    .gal-slide.gal-active { transform:scale(1); opacity:1; }
    .gal-slide img { width:100%; aspect-ratio:4/3; object-fit:cover; display:block; border-radius:var(--radius); border:1px solid var(--border); }
    .gal-slide-overlay { position:absolute; inset:0 8px; border-radius:var(--radius); background:linear-gradient(to top,rgba(0,0,0,.5) 0%,transparent 60%); transition:background .3s; }
    .gal-slide.gal-active:hover .gal-slide-overlay { background:linear-gradient(to top,rgba(23,162,221,.45) 0%,rgba(0,0,0,.1) 100%); }
    .gal-carousel-nav { display:flex; align-items:center; justify-content:center; gap:16px; margin-top:24px; }
    .gal-arrow { width:40px; height:40px; border-radius:50%; border:1px solid var(--border); background:var(--bg3); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; }
    .gal-arrow:hover { border-color:rgba(23,162,221,.5); background:rgba(23,162,221,.1); }
    .gal-arrow svg { width:16px; height:16px; stroke:var(--gray); fill:none; stroke-width:2; }
    .gal-arrow:hover svg { stroke:var(--accent2); }
    .gal-count { font-size:.75rem; color:var(--gray2); letter-spacing:.08em; }
    .gallery-social-footer { text-align:center; padding:48px 0 8px; }
    .gallery-social-label { font-size:.7rem; color:var(--gray2); letter-spacing:.18em; text-transform:uppercase; font-weight:600; margin-bottom:18px; }
    .gallery-social-links { display:flex; justify-content:center; gap:14px; }
    .gal-social-btn { display:inline-flex; align-items:center; gap:10px; background:var(--bg3); border:1px solid var(--border); color:var(--gray); padding:11px 24px; border-radius:var(--radius); font-family:var(--font-head); font-size:.78rem; font-weight:700; letter-spacing:.07em; text-decoration:none; text-transform:uppercase; transition:all .25s; }
    .gal-social-btn svg { width:17px; height:17px; flex-shrink:0; }
    .gal-social-btn:hover { color:var(--white); border-color:rgba(23,162,221,.45); background:var(--accent-dim); transform:translateY(-2px); }

    /* ─── Testimonials ───────────────────────────────────── */
    .testi-carousel-outer { position:relative; overflow:hidden; margin:50px auto 0; max-width:1140px; }
    .testi-carousel { display:flex; transition:transform .5s cubic-bezier(.25,.46,.45,.94); }
    .testi-slide { flex:0 0 33.333%; padding:0 11px; }
    .testi-card { background:var(--bg3); border:1px solid var(--border); border-radius:var(--radius); padding:32px; position:relative; height:100%; transition:border-color .25s; }
    .testi-card:hover { border-color:rgba(23,162,221,.25); }
    .testi-quote { font-family:var(--font-head); font-size:4.5rem; font-weight:900; color:rgba(23,162,221,.12); line-height:.8; margin-bottom:12px; user-select:none; }
    .testi-stars { color:var(--accent2); font-size:1rem; letter-spacing:3px; margin-bottom:12px; }
    .testi-text { font-size:.92rem; color:var(--gray); line-height:1.8; font-weight:300; font-style:italic; margin-bottom:22px; }
    .testi-author { display:flex; align-items:center; gap:14px; }
    .testi-avatar { width:40px; height:40px; border-radius:50%; background:var(--accent); display:flex; align-items:center; justify-content:center; font-family:var(--font-head); font-weight:800; font-size:.9rem; color:white; flex-shrink:0; }
    .testi-name { font-weight:600; font-size:.87rem; }
    .testi-meta { font-size:.72rem; color:var(--gray2); margin-top:2px; }
    .testi-controls { display:flex; align-items:center; justify-content:space-between; margin:28px auto 0; max-width:1140px; }
    .testi-dots { display:flex; gap:8px; }
    .testi-dot { width:8px; height:8px; border-radius:50%; background:var(--gray2); cursor:pointer; transition:background .2s,transform .2s; border:none; }
    .testi-dot.active { background:var(--accent); transform:scale(1.35); }
    .testi-arrows { display:flex; gap:8px; }
    .testi-arrow { width:38px; height:38px; border-radius:50%; border:1px solid var(--border); background:var(--bg3); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; }
    .testi-arrow:hover { border-color:rgba(23,162,221,.5); background:rgba(23,162,221,.1); }
    .testi-arrow svg { width:15px; height:15px; stroke:var(--gray); fill:none; stroke-width:2; }
    .testi-arrow:hover svg { stroke:var(--accent2); }

    /* ─── CTA Banner ─────────────────────────────────────── */
    #cta { background:var(--accent); padding:70px var(--section-h); text-align:center; position:relative; overflow:hidden; }
    #cta::before { content:''; position:absolute; inset:0; background:repeating-linear-gradient(90deg,transparent,transparent 70px,rgba(0,0,0,.06) 70px,rgba(0,0,0,.06) 71px); }
    #cta::after  { content:''; position:absolute; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 70px,rgba(0,0,0,.04) 70px,rgba(0,0,0,.04) 71px); }
    .cta-title { font-family:var(--font-head); font-size:clamp(1.6rem,3vw,2.5rem); font-weight:900; color:white; margin-bottom:12px; position:relative; z-index:1; }
    .cta-sub { color:rgba(255,255,255,.75); font-size:1rem; margin-bottom:34px; position:relative; z-index:1; }
    .btn-white { display:inline-flex; align-items:center; gap:10px; background:white; color:var(--accent); padding:15px 36px; border-radius:var(--radius); font-weight:700; font-size:.95rem; text-decoration:none; letter-spacing:.04em; position:relative; z-index:1; transition:all .25s; }
    .btn-white:hover { background:#f0f0f0; transform:translateY(-3px); box-shadow:0 14px 36px rgba(0,0,0,.3); }

/* ── Smooth anchor offset ────────────────────────────────────── */
document.addEventListener('click', e => {
  const a = e.target.closest('a[href^="#"]');
  if (!a) return;
  const t = document.querySelector(a.getAttribute('href'));

});

/* ── Scroll-spy fade-up (runs after render so all .fade-up exist) ── */
const io = new IntersectionObserver(
  entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('vis'); }),
  { threshold:.1 }
);
document.querySelectorAll('.fade-up').forEach(el => io.observe(el));

/* ── Hero water-mist canvas animation ────────────────────────── */
(function() {
  const canvas = document.getElementById('heroCanvas');
  const ctx    = canvas.getContext('2d');
  let W, H;
  function resize() { W = canvas.width = canvas.offsetWidth; H = canvas.height = canvas.offsetHeight; }

  class Drop {
    constructor(init) { this.reset(init); }
    reset(randomY=false) {
      this.x = Math.random()*W; this.y = randomY ? Math.random()*H : -20;
      this.mist = Math.random() < .62;
      if (this.mist) { this.r=Math.random()*2+.4; this.vy=Math.random()*1.1+.2; this.vx=(Math.random()-.5)*2.2; this.alpha=Math.random()*.18+.03; }
      else           { this.r=Math.random()*1.4+.4; this.elong=Math.random()*3.5+2; this.vy=Math.random()*7+3.5; this.vx=(Math.random()-.5)*.7; this.alpha=Math.random()*.45+.1; }
    }
    update() { this.x+=this.vx; this.y+=this.vy; if(this.y>H+20||this.x<-10||this.x>W+10) this.reset(); }
    draw() {
      ctx.save(); ctx.globalAlpha=this.alpha;
      if (this.mist) { ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fillStyle='rgba(185,220,255,1)'; ctx.fill(); }
      else {
        ctx.beginPath(); ctx.ellipse(this.x,this.y,this.r*.45,this.r*this.elong,0,0,Math.PI*2); ctx.fillStyle='rgba(155,205,255,1)'; ctx.fill();
        ctx.beginPath(); ctx.ellipse(this.x-this.r*.14,this.y-this.r*.55,this.r*.18,this.r*.65,0,0,Math.PI*2); ctx.fillStyle='rgba(255,255,255,.5)'; ctx.fill();
      }
      ctx.restore();
    }
  }

  class Streak {
    constructor() { this.reset(); }
    reset() { this.x=W+80+Math.random()*100; this.y=Math.random()*H*.65+H*.1; this.len=Math.random()*130+45; this.vx=-(Math.random()*13+7); this.vy=Math.random()*3.5+.8; this.alpha=Math.random()*.1+.025; this.w=Math.random()*1.5+.3; this.life=0; this.maxLife=Math.floor(Math.random()*30+18); }
    update() { this.x+=this.vx; this.y+=this.vy; this.life++; if(this.life>this.maxLife||this.x<-this.len-50) this.reset(); }
    draw() { const a=this.alpha*Math.sin((this.life/this.maxLife)*Math.PI); ctx.save(); ctx.globalAlpha=a; ctx.strokeStyle='rgba(200,235,255,1)'; ctx.lineWidth=this.w; ctx.lineCap='round'; ctx.beginPath(); ctx.moveTo(this.x,this.y); ctx.lineTo(this.x+this.len,this.y-this.len*.04); ctx.stroke(); ctx.restore(); }
  }

  let drops, streaks;
  function init() { resize(); drops=Array.from({length:135},()=>new Drop(true)); streaks=Array.from({length:9},()=>new Streak()); }
  function loop() { ctx.clearRect(0,0,W,H); drops.forEach(d=>{d.update();d.draw();}); streaks.forEach(s=>{s.update();s.draw();}); requestAnimationFrame(loop); }
  window.addEventListener('resize', resize, {passive:true});
  init(); loop();
})();

/* ── Gallery tab switching ────────────────────────────────────── */
document.getElementById('galleryTabs').addEventListener('click', e => {
  const btn = e.target.closest('.gtab');
  if (!btn) return;
  const tab = btn.dataset.tab;
  document.querySelectorAll('.gtab').forEach(b => b.classList.toggle('active', b.dataset.tab===tab));
  document.querySelectorAll('.gallery-panel').forEach(p => {
    p.classList.toggle('active', p.dataset.tab===tab);
    if (p.dataset.tab===tab) {
      const c = p.querySelector('.gallery-carousel');
      if (c) galInit(c.id);
    }
  });
});

/* ── Gallery infinite carousel ───────────────────────────────── */
const galIdx = {};
function galApply(id, animate) {
  const el = document.getElementById(id);
  const slide = el.querySelector('.gal-slide');
  const slideW = slide ? slide.offsetWidth : 0;
  const wrapW = el.parentElement.offsetWidth;
  const tx = galIdx[id] * slideW - (wrapW - slideW) / 2;   /* center the active slide for any slide width */
  el.style.transition = animate ? 'transform .5s cubic-bezier(.25,.46,.45,.94)' : 'none';
  el.style.transform = `translateX(-${tx}px)`;
  if (!animate) requestAnimationFrame(() => { el.style.transition = ''; });
}
function galInit(id) {
  galIdx[id] = 2;
  galApply(id, false);
  galUpdateActive(id);
}
function galUpdateActive(id) {
  const el = document.getElementById(id);
  const slides = el.querySelectorAll('.gal-slide');
  const cur = galIdx[id];
  slides.forEach((s,i) => s.classList.toggle('gal-active', i === cur));
  const total = parseInt(el.dataset.total);
  const realIdx = ((cur - 2) % total + total) % total + 1;
  const countEl = el.closest('.gallery-panel').querySelector('.gal-count');
  if (countEl) countEl.textContent = `${realIdx} / ${total}`;
}
function galGo(id, dir) {
  const el = document.getElementById(id);
  const total = parseInt(el.dataset.total);
  galIdx[id] += dir;
  galApply(id, true);
  galUpdateActive(id);
  el.addEventListener('transitionend', function handler() {
    el.removeEventListener('transitionend', handler);
    if (galIdx[id] <= 1) {
      galIdx[id] = total + 1;
      galApply(id, false);
      galUpdateActive(id);
    } else if (galIdx[id] > total + 1) {
      galIdx[id] = 2;
      galApply(id, false);
      galUpdateActive(id);
    }
  });
}
document.querySelectorAll('.gallery-carousel').forEach(el => {
  galInit(el.id);
  /* swipe support — drag left/right on touch devices */
  let gx = 0;
  el.addEventListener('touchstart', e => { gx = e.touches[0].clientX; }, {passive:true});
  el.addEventListener('touchend',   e => {
    const dx = gx - e.changedTouches[0].clientX;
    if (Math.abs(dx) > 40) galGo(el.id, dx > 0 ? 1 : -1);
  });
});
window.addEventListener('resize', () => {
  document.querySelectorAll('.gallery-carousel').forEach(el => {
    if (galIdx[el.id] !== undefined) galApply(el.id, false);
  });
}, {passive:true});

/* ── Testimonial carousel ────────────────────────────────────── */
(function() {
  const carousel = document.getElementById('testiCarousel');
  const dotsWrap = document.getElementById('testiDots');
  let cur = 0;
  function slides()  { return document.querySelectorAll('.testi-slide'); }
  function perView() { return window.innerWidth>1060 ? 3 : window.innerWidth>640 ? 2 : 1; }
  function maxIdx()  { return Math.ceil(slides().length/perView())-1; }

  function buildDots() {
    dotsWrap.innerHTML='';
    for(let i=0;i<=maxIdx();i++) {
      const d=document.createElement('button');
      d.className='testi-dot'+(i===cur?' active':'');
      d.addEventListener('click',()=>goTo(i));
      dotsWrap.appendChild(d);
    }
  }
  function goTo(n) {
    cur=Math.max(0,Math.min(n,maxIdx()));
    carousel.style.transform=`translateX(-${cur*100}%)`;
    dotsWrap.querySelectorAll('.testi-dot').forEach((d,i)=>d.classList.toggle('active',i===cur));
  }
  document.getElementById('tPrev').addEventListener('click',()=>goTo(cur-1));
  document.getElementById('tNext').addEventListener('click',()=>goTo(cur+1));
  window.addEventListener('resize',()=>{ buildDots(); goTo(Math.min(cur,maxIdx())); });

  let tsX=0;
  carousel.addEventListener('touchstart',e=>{tsX=e.touches[0].clientX;},{passive:true});
  carousel.addEventListener('touchend',  e=>{ if(Math.abs(tsX-e.changedTouches[0].clientX)>50) goTo(cur+(tsX-e.changedTouches[0].clientX>0?1:-1)); });

  buildDots();
})();
</script>
